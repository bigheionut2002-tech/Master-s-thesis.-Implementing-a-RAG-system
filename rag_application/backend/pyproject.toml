[tool.pytest.ini_options]
minversion = "8.0"
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
asyncio_mode = "auto"
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.coverage.run]
branch = true
source = ["api", "core", "models", "repositories", "services"]
omit = ["tests/*", "main.py"]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 70
